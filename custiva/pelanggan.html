<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pelanggan - CUSTIVA</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">

<style>
/* GLOBAL TEXT */
h2, th, td, h5 {
    color: white;
}

/* TABLE CARD PREMIUM */
.table-card{
    background: rgba(255,255,255,0.14);
    border-radius: 20px;
    padding: 20px;
    backdrop-filter: blur(18px);
    box-shadow: 0 15px 40px rgba(0,0,0,0.25);
}

/* TABLE STYLE */
.table{
    color: white;
    margin-bottom: 0;
}

.table thead th{
    border-bottom: 1px solid rgba(255,255,255,0.2);
    font-weight: 600;
}

.table tbody tr{
    transition: 0.2s;
}

.table tbody tr:hover{
    background: rgba(255,255,255,0.08);
}

/* BADGE UPGRADE */
.badge{
    padding: 6px 10px;
    border-radius: 12px;
    font-size: 12px;
}

/* STATUS HOVER EFFECT */
.table td span{
    transition: 0.3s;
}

.table td span:hover{
    transform: scale(1.1);
}
</style>

</head>

<body>

<div class="d-flex">

<!-- SIDEBAR -->
<div class="sidebar">
<img src="assets/images/logo.png" class="sidebar-logo">

<ul class="menu">
<li><a href="dashboard.html">Dashboard</a></li>
<li class="active"><a href="pelanggan.html">Pelanggan</a></li>
<li><a href="chat.html">Chat</a></li>

<li><a href="tracking.html">Tracking</a></li>
<li><a href="laporan.html">Laporan</a></li>
<li><a href="pengaturan.html">Pengaturan</a></li>
</ul>
</div>

<!-- CONTENT -->
<div class="content">

<h2 class="fw-bold mb-3">Data Pelanggan</h2>
<p class="text-white-50">Kelola data pelanggan kamu dengan mudah</p>

<div class="table-card">

<table class="table align-middle">

<thead>
<tr>
<th>Nama</th>
<th>Email</th>
<th>Telepon</th>
<th>Status</th>
</tr>
</thead>

<tbody id="tabelPelanggan">
</tbody>

<tr>
<td>PT Sinar Baja</td>
<td>sinar@gmail.com</td>
<td>08123456789</td>
<td><span class="badge bg-success">Aktif</span></td>
</tr>

<tr>
<td>CV Maju Jaya</td>
<td>maju@gmail.com</td>
<td>0822334455</td>
<td><span class="badge bg-warning text-dark">Pending</span></td>
</tr>

</tbody>

</table>

</div>

</div>

</div>
<script>

let pelanggan = JSON.parse(localStorage.getItem("pelanggan")) || [];

// data contoh pertama kali
if(pelanggan.length === 0){

    pelanggan = [
        {
            nama:"PT Sinar Baja",
            email:"sinar@gmail.com",
            telepon:"08123456789",
            status:"Aktif"
        },
        {
            nama:"CV Maju Jaya",
            email:"maju@gmail.com",
            telepon:"0822334455",
            status:"Pending"
        }
    ];

    localStorage.setItem(
        "pelanggan",
        JSON.stringify(pelanggan)
    );
}

let html = "";

pelanggan.forEach(function(item){

    let badge = "";

    if(item.status === "Aktif"){
        badge = '<span class="badge bg-success">Aktif</span>';
    }
    else{
        badge = '<span class="badge bg-warning text-dark">Pending</span>';
    }

    html += `
    <tr>
        <td>${item.nama}</td>
        <td>${item.email}</td>
        <td>${item.telepon}</td>
        <td>${badge}</td>
    </tr>
    `;
});

document.getElementById("tabelPelanggan").innerHTML = html;

</script>
</body>
</html>
