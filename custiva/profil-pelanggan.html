<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Profil Pelanggan - CUSTIVA</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">

</head>

<body>

<div class="d-flex">

<!-- ================= SIDEBAR FIX ================= -->
<div class="sidebar">

    <img src="assets/images/logo.png" class="sidebar-logo">

    <ul class="menu">

        <li>
            <a href="dashboard-pelanggan.html">Dashboard</a>
        </li>

        <li>
            <a href="pesanan.html">Pesanan</a>
        </li>

        <li>
            <a href="tracking-pelanggan.html">Tracking</a>
        </li>

        <li>
            <a href="chat-pelanggan.html">Chat</a>
        </li>

        <li class="active">
            <a href="profil-pelanggan.html">Profil</a>
        </li>

        <li>
            <a href="index.html">Logout</a>
        </li>

    </ul>

</div>

<!-- ================= CONTENT ================= -->
<div class="content">

    <h2 class="fw-bold text-white">
        Profil Pelanggan
    </h2>

    <p class="text-white">
        Kelola informasi akun pelanggan
    </p>

    <div class="profile-card mt-4">

        <div class="text-center mb-4">

            <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png"
                 class="profile-avatar">

            <h4 class="mt-3">
                PT Sinar Baja
            </h4>

            <p class="text-muted">
                Pelanggan Aktif
            </p>

        </div>

        <div class="mb-3">
            <label class="form-label">Nama Perusahaan</label>
            <input type="text" id="namaPerusahaan" class="form-control">
        </div>

        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" id="emailPerusahaan" class="form-control">
        </div>

        <div class="mb-3">
            <label class="form-label">Nomor Telepon</label>
            <input type="text" id="teleponPerusahaan" class="form-control">
        </div>

        <button
class="btn btn-primary w-100"
onclick="simpanProfil()">
    Simpan Perubahan
</button>

    </div>

</div>

</div>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getDatabase,
ref,
set,
onValue
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyCt5yenhrqh4T3130MQTYrCdPxYfLHF6-I",
authDomain: "custiva-e4710.firebaseapp.com",
databaseURL: "https://custiva-13223-default-rtdb.firebaseio.com",
projectId: "custiva-e4710",
storageBucket: "custiva-e4710.firebasestorage.app",
messagingSenderId: "999523122079",
appId: "1:999523122079:web:317db095a3c42575611baa"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* LOAD DATA */

onValue(ref(db,"profil_pelanggan"),(snapshot)=>{

const data = snapshot.val();

if(!data) return;

document.getElementById("namaPerusahaan").value =
data.nama || "";

document.getElementById("emailPerusahaan").value =
data.email || "";

document.getElementById("teleponPerusahaan").value =
data.telepon || "";

});

/* SIMPAN DATA */

window.simpanProfil = function(){

set(ref(db,"profil_pelanggan"),{

nama:
document.getElementById("namaPerusahaan").value,

email:
document.getElementById("emailPerusahaan").value,

telepon:
document.getElementById("teleponPerusahaan").value

});

alert("Profil pelanggan berhasil disimpan!");

}

</script>
</body>
</html>
