<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chat Admin - CUSTIVA</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">

</head>

<body>

<div class="d-flex">

<!-- SIDEBAR -->
<div class="sidebar">
<img src="assets/images/logo.png" class="sidebar-logo">

<ul class="menu">
<li><a href="dashboard.html">Dashboard</a></li>
<li><a href="pelanggan.html">Pelanggan</a></li>
<li class="active"><a href="chat.html">Chat</a></li>
<li><a href="reminder.html">Reminder</a></li>
<li><a href="tracking.html">Tracking</a></li>
<li><a href="laporan.html">Laporan</a></li>
<li><a href="pengaturan.html">Pengaturan</a></li>
</ul>

</div>

<!-- CONTENT -->
<div class="content">

<h2 class="fw-bold mb-4">Chat Admin Panel</h2>

<div class="chat-card">

<!-- ROOM / PT SELECT -->
<select id="roomSelect" class="mb-2" onchange="changeRoom()">
</select>

<div class="chat-box" id="chatBox"></div>

<div class="chat-input">
<input type="text" id="msg" placeholder="Ketik pesan admin...">
<button onclick="sendDebug()">Kirim</button>
</div>

</div>

</div>

</div>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCt5yenhrqh4T3130MQTYrCdPxYfLHF6-I",
  authDomain: "custiva-e4710.firebaseapp.com",
  databaseURL: "https://custiva-13223-default-rtdb.firebaseio.com",
  projectId: "custiva-e4710",
  storageBucket: "custiva-e4710.firebasestorage.app",
  messagingSenderId: "999523122079",
  appId: "1:999523122079:web:317db095a3c42575611baa"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

console.log("FIREBASE BERHASIL");

let room = "";

const chatBox = document.getElementById("chatBox");
const roomSelect = document.getElementById("roomSelect");

/* ================= AMBIL PERUSAHAAN DARI PESANAN ================= */

onValue(ref(db,"pesanan"), (snapshot)=>{

    roomSelect.innerHTML = "";

    let daftarPT = [];
    let pertama = true;

    snapshot.forEach((child)=>{

        let data = child.val();

        if(!data.perusahaan) return;

        if(daftarPT.includes(data.perusahaan)) return;

        daftarPT.push(data.perusahaan);

        let roomName = data.perusahaan
    .replace(/[.#$\[\]]/g,"")
    .replace(/\s+/g,"_");

        roomSelect.innerHTML += `
        <option value="${roomName}">
            ${data.perusahaan}
        </option>
        `;

        if(pertama){
            room = roomName;
            pertama = false;
        }

    });

    if(room !== ""){
        loadChat();
    }

});

/* ================= ROOM CHANGE ================= */

window.changeRoom = function(){

    room = roomSelect.value;
    loadChat();

}

/* ================= SEND MESSAGE ================= */

window.sendDebug = function(){

    alert("SENDDEBUG JALAN");

    console.log("send =", typeof send);
    console.log("window.send =", typeof window.send);

    window.send();

}

window.send = async function(){

    let text = document.getElementById("msg").value;

    console.log("ROOM ADMIN =", room);

    try{

        await push(ref(db,"chat/"+room),{
            pesan:text,
            role:"admin",
            nama:"Admin CUSTIVA",
            time:new Date().toLocaleTimeString()
        });

        alert("BERHASIL SIMPAN");

    }catch(error){

        console.error(error);
        alert(error.message);

    }

}

/* ================= REALTIME CHAT ================= */

function loadChat(){

    onValue(ref(db,"chat/"+room),(snapshot)=>{

        chatBox.innerHTML = "";

        snapshot.forEach((child)=>{

            let v = child.val();

            let div = document.createElement("div");

            div.className =
                "msg " +
                (v.role === "admin" ? "right" : "left");

            div.innerHTML = `
            <b>${v.nama}</b><br>
            ${v.pesan}<br>
            <small>${v.time ?? ""}</small>
            `;

            chatBox.appendChild(div);

        });

        chatBox.scrollTop = chatBox.scrollHeight;

    });

}

console.log("SCRIPT CHAT BERHASIL DIMUAT");

</script>

</body>
</html>
