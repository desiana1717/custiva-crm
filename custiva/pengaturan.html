<small class="text-muted">Administrator Account</small>

<div class="mb-3">
<label class="form-label">Nama Lengkap</label>

</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getDatabase,
ref,
set,
onValue
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyCt5yenhrqh4T3130MQTYrCdPxYfLHF6-I",
authDomain: "custiva-e4710.firebaseapp.com",
databaseURL: "https://custiva-13223-default-rtdb.firebaseio.com",
projectId: "custiva-e4710",
storageBucket: "custiva-e4710.firebasestorage.app",
messagingSenderId: "999523122079",
appId: "1:999523122079:web:317db095a3c42575611baa"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

onValue(ref(db,"pengaturan_admin"),(snapshot)=>{

const data = snapshot.val();

if(!data) return;

document.getElementById("namaAdmin").value =
data.nama || "";

document.getElementById("emailAdmin").value =
data.email || "";

document.getElementById("passwordAdmin").value =
data.password || "";

});

window.simpanAdmin = function(){

set(ref(db,"pengaturan_admin"),{

nama:
document.getElementById("namaAdmin").value,

email:
document.getElementById("emailAdmin").value,

password:
document.getElementById("passwordAdmin").value

});

alert("Data admin berhasil disimpan!");

}

</script>
