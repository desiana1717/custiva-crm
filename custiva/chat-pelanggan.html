<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chat Pelanggan - CUSTIVA</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">

</head>

<body>

<div class="d-flex">

<!-- ================= SIDEBAR FIX ================= -->
<div class="sidebar">

    <img src="assets/images/logo.png" class="sidebar-logo">

    <ul class="menu">

        <li>
            <a href="dashboard-pelanggan.html">Dashboard</a>
        </li>

        <li>
            <a href="pesanan.html">Pesanan</a>
        </li>

        <li>
            <a href="tracking-pelanggan.html">Tracking</a>
        </li>

        <li class="active">
            <a href="chat-pelanggan.html">Chat</a>
        </li>

        <li>
            <a href="profil-pelanggan.html">Profil</a>
        </li>

        <li>
            <a href="index.html">Logout</a>
        </li>

    </ul>

</div>

<!-- ================= CONTENT ================= -->
<div class="content">

    <h2 class="fw-bold mb-4 text-white">
        Chat Customer Service
    </h2>

    <div class="chat-card">

        <!-- ROOM -->
        <select id="roomSelect"
        class="mb-2 form-control"
        onchange="changeRoom()">
</select>

        <!-- CHAT BOX -->
        <div class="chat-box" id="chatBox"></div>

        <!-- INPUT -->
        <div class="chat-input">
            <input type="text" id="msg" placeholder="Ketik pesan...">
            <button onclick="send()">Kirim</button>
        </div>

    </div>

</div>

</div>

<!-- ================= FIREBASE ================= -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCt5yenhrqh4T3130MQTYrCdPxYfLHF6-I",
  authDomain: "custiva-e4710.firebaseapp.com",
  databaseURL: "https://custiva-13223-default-rtdb.firebaseio.com",
  projectId: "custiva-e4710",
  storageBucket: "custiva-e4710.firebasestorage.app",
  messagingSenderId: "999523122079",
  appId: "1:999523122079:web:317db095a3c42575611baa"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let room = "";

const chatBox = document.getElementById("chatBox");
const roomSelect = document.getElementById("roomSelect");

onValue(ref(db,"pesanan"), (snapshot)=>{

    roomSelect.innerHTML = "";

    let daftarPT = [];

    snapshot.forEach((child)=>{

        let data = child.val();

        if(!data.perusahaan) return;

        if(daftarPT.includes(data.perusahaan)) return;

        daftarPT.push(data.perusahaan);

        let roomName = data.perusahaan
    .replace(/[.#$\[\]]/g,"")
    .replace(/\s+/g,"_");

        roomSelect.innerHTML += `
            <option value="${roomName}">
                ${data.perusahaan}
            </option>
        `;
    });

    if(daftarPT.length > 0){

    room = daftarPT[0]
        .replace(/[.#$\[\]]/g,"")
        .replace(/\s+/g,"_");

    console.log("ROOM PELANGGAN =", room);

    loadChat();
}

});

/* ================= ROOM ================= */
window.changeRoom = function () {
    room = document.getElementById("roomSelect").value;
    loadChat();
}

/* ================= SEND ================= */
window.send = function () {

    let text = document.getElementById("msg").value;

    if (text.trim() === "") return;

    push(ref(db, "chat/" + room), {
        pesan: text,
        role: "pelanggan",
        nama: "Pelanggan",
        time: new Date().toLocaleTimeString()
    });

    document.getElementById("msg").value = "";
}

/* ================= REALTIME ================= */
function loadChat() {

    onValue(ref(db, "chat/" + room), (snapshot) => {

        chatBox.innerHTML = "";

        snapshot.forEach((child) => {

    let v = child.val();

console.log(v.nama);
console.log(v.pesan);
console.log(v.role);

    let div = document.createElement("div");

    div.className = "msg " + (v.role === "admin" ? "left" : "right");

    div.innerHTML = `
        <b>${v.nama}</b><br>
        ${v.pesan}<br>
        <small>${v.time ?? ""}</small>
    `;

    chatBox.appendChild(div);

});

        chatBox.scrollTop = chatBox.scrollHeight;

    });

}

loadChat();

</script>

</body>
</html>
