<!DOCTYPE html>
<html lang="id">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CUSTIVA - Register</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="assets/css/style.css">

</head>

<body class="login-body">

<div class="blur-circle blur-1"></div>
<div class="blur-circle blur-2"></div>

<div class="container-fluid">

<div class="row min-vh-100">

<!-- KIRI -->
<div class="col-lg-6 d-flex flex-column justify-content-center align-items-center text-center text-white">

<img src="assets/images/logo.png" class="logo-animate mb-3">

<h1 class="hero-title">
CUSTIVA
</h1>

<p class="opacity-75 px-4">
Platform CRM modern untuk membantu bisnis mengelola pelanggan.
</p>

</div>

<!-- KANAN -->
<div class="col-lg-6 d-flex justify-content-center align-items-center">

<div class="login-card">

<h2 class="fw-bold mb-3">
Create Account ✨
</h2>

<form onsubmit="register(event)">

<!-- ROLE -->
<label class="mb-1">
Daftar Sebagai
</label>

<select
id="role"
class="form-control custom-input mb-3">

<option value="">
Pilih Role
</option>

<option value="admin">
🏢 Admin Perusahaan
</option>

<option value="pelanggan">
👤 Pelanggan
</option>

</select>

<!-- NAMA -->
<input
type="text"
id="nama"
class="form-control custom-input mb-3"
placeholder="Nama Lengkap">

<!-- EMAIL -->
<input
type="email"
id="email"
class="form-control custom-input mb-3"
placeholder="Email">

<!-- PASSWORD -->
<input
type="password"
id="password"
class="form-control custom-input mb-3"
placeholder="Password">

<!-- KONFIRMASI -->
<input
type="password"
id="konfirmasi"
class="form-control custom-input mb-3"
placeholder="Konfirmasi Password">

<!-- CHECKBOX -->
<div class="mb-3">

<input
type="checkbox"
id="setuju">

<label for="setuju">
Saya setuju
</label>

</div>

<!-- BUTTON -->
<button
type="submit"
class="login-btn">

Daftar

</button>

</form>

<!-- LOGIN -->
<div class="text-center mt-3">

<small>

Sudah punya akun?

<a
href="index.html"
class="text-white fw-bold">

Login

</a>

</small>

</div>

</div>

</div>

</div>

</div>

<script>

function register(event){

event.preventDefault();

/* AMBIL DATA */

let role =
document.getElementById("role").value;

let nama =
document.getElementById("nama").value.trim();

let email =
document.getElementById("email").value.trim();

let password =
document.getElementById("password").value.trim();

let konfirmasi =
document.getElementById("konfirmasi").value.trim();

let setuju =
document.getElementById("setuju").checked;

/* VALIDASI */

if(role === ""){
alert("Silakan pilih role!");
return;
}

if(nama === ""){
alert("Nama lengkap wajib diisi!");
return;
}

if(email === ""){
alert("Email wajib diisi!");
return;
}

if(password === ""){
alert("Password wajib diisi!");
return;
}

if(konfirmasi === ""){
alert("Konfirmasi password wajib diisi!");
return;
}

if(password !== konfirmasi){
alert("Password dan konfirmasi password tidak sama!");
return;
}

if(!setuju){
alert("Silakan centang persetujuan terlebih dahulu!");
return;
}

/* SIMPAN ROLE */

localStorage.setItem("role", role);

alert("Registrasi berhasil!");

/* REDIRECT */

if(role === "admin"){

window.location.href =
"dashboard.html";

}
else{

window.location.href =
"dashboard-pelanggan.html";

}

}

</script>

</body>
</html>
