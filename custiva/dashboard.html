<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - CUSTIVA</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">

<style>
/* tambahan khusus dashboard biar lebih premium */

h2, h4, p, h5 {
    color: white;
}

.chart-card{
    background: rgba(255,255,255,0.14);
    border-radius: 20px;
    padding: 20px;
    backdrop-filter: blur(18px);
    box-shadow: 0 15px 40px rgba(0,0,0,0.25);
}

/* card stats lebih hidup */
.dashboard-card{
    background: rgba(255,255,255,0.14);
    border-radius: 18px;
    padding: 20px;
    backdrop-filter: blur(18px);
    box-shadow: 0 12px 35px rgba(0,0,0,0.25);
}

/* hover efek */
.dashboard-card:hover{
    transform: translateY(-5px);
}

/* chart bar lebih jelas */
.bar{
    background: rgba(255,255,255,0.25);
    border-radius: 12px;
    width: 40px;
    color: white;
    display: flex;
    justify-content: center;
    align-items: flex-end;
    font-size: 11px;
    padding-bottom: 5px;
    transition: 0.3s;
}

.bar:hover{
    transform: scale(1.05);
    background: rgba(255,255,255,0.35);
}
</style>

</head>

<body>

<div class="d-flex">

<!-- SIDEBAR -->
<div class="sidebar">
<img src="assets/images/logo.png" class="sidebar-logo">

<ul class="menu">
<li class="active"><a href="dashboard.html">Dashboard</a></li>
<li><a href="pelanggan.html">Pelanggan</a></li>
<li><a href="chat.html">Chat</a></li>
<li><a href="reminder.html">Reminder</a></li>
<li><a href="tracking.html">Tracking</a></li>
<li><a href="laporan.html">Laporan</a></li>
<li><a href="pengaturan.html">Pengaturan</a></li>
</ul>
</div>

<!-- CONTENT -->
<div class="content">

<h2 class="fw-bold">Dashboard</h2>
<p>Selamat datang di CUSTIVA CRM</p>

<!-- STATS -->
<div class="row">

<div class="col-md-4 mb-3">
<div class="dashboard-card">
<h5>Total Pelanggan</h5>
<h2 id="totalPelanggan">0</h2>
</div>
</div>

<div class="col-md-4 mb-3">
<div class="dashboard-card">
<h5>Pesanan Aktif</h5>
<h2>35</h2>
</div>
</div>

<div class="col-md-4 mb-3">
<div class="dashboard-card">
<h5>Pelanggan Aktif</h5>
<h2 id="totalSelesai">0</h2>
</div>
</div>

</div>

<!-- CHART -->
<div class="chart-card mt-4">
<h4>Statistik Order Bulanan</h4>

<div class="chart mt-3 d-flex gap-3 align-items-end">

<div class="bar" style="height:120px;">Jan</div>
<div class="bar" style="height:180px;">Feb</div>
<div class="bar" style="height:150px;">Mar</div>
<div class="bar" style="height:220px;">Apr</div>
<div class="bar" style="height:260px;">Mei</div>
<div class="bar" style="height:200px;">Jun</div>

</div>

</div>

</div>
</div>
<script>

// Ambil data pelanggan
let pelanggan = JSON.parse(localStorage.getItem("pelanggan")) || [];

// Total pelanggan
document.getElementById("totalPelanggan").innerHTML = pelanggan.length;

// Hitung pelanggan selesai
let selesai = pelanggan.filter(item => item.status === "Selesai").length;

document.getElementById("totalSelesai").innerHTML = selesai;

</script>
</body>
</html>
