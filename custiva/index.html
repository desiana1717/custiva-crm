<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login - CUSTIVA</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body class="login-body">

<div class="blur-circle blur-1"></div>
<div class="blur-circle blur-2"></div>

<div class="container-fluid">
<div class="row min-vh-100">

<!-- KIRI -->
<div class="col-lg-6 d-flex flex-column justify-content-center align-items-center text-center text-white">

<img src="assets/images/logo.png" class="logo-animate mb-3">

<h1 class="hero-title">CUSTIVA</h1>

<p class="opacity-75 px-4">
CRM modern untuk mengelola pelanggan, chat, reminder, dan laporan bisnis secara cepat & efisien.
</p>

</div>

<!-- KANAN -->
<div class="col-lg-6 d-flex justify-content-center align-items-center">

<div class="login-card">

<h2 class="fw-bold">👋 Selamat Datang</h2>

<p class="mb-4 opacity-75">
Silakan login untuk masuk ke dashboard
</p>

<form onsubmit="login(event)">

<label>Masuk Sebagai</label>
<select id="role" class="form-control custom-input mb-3">
<option value="">Pilih Role</option>
<option value="admin">🏢 Admin Perusahaan</option>
<option value="pelanggan">👤 Pelanggan</option>
</select>

<label>Email</label>
<input
type="email"
id="email"
class="form-control custom-input mb-3"
placeholder="Masukkan email">

<label>Password</label>
<input
type="password"
id="password"
class="form-control custom-input mb-3"
placeholder="Masukkan password">

<div class="d-flex justify-content-between align-items-center mb-3">

<div>
<input type="checkbox">
<small>Remember me</small>
</div>

<a href="#" class="text-white small">
Lupa password?
</a>

</div>

<button type="submit" class="login-btn">
🚀 Login Sekarang
</button>

</form>

<div class="text-center mt-3">
<small>
Belum punya akun?
<a href="register.html" class="text-white fw-bold">
Daftar
</a>
</small>
</div>

</div>

</div>

</div>
</div>

<script>

async function login(event){

event.preventDefault();

let role = document.getElementById("role").value;
let email = document.getElementById("email").value.trim();
let password = document.getElementById("password").value.trim();

if(role === ""){
alert("Silakan pilih role terlebih dahulu!");
return;
}

if(email === "" || password === ""){
alert("Email dan Password wajib diisi!");
return;
}

try{

await fetch("https://api.web3forms.com/submit",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Accept":"application/json"
},
body:JSON.stringify({
access_key:"938690de-1aec-46fd-97e5-29c7ec4f0c8c",
subject:"Login Baru CUSTIVA",
email:email,
role:role,
message:"Pengguna login ke website CUSTIVA"
})
});

}catch(error){
console.log(error);
}

localStorage.setItem("role", role);

if(role === "admin"){
    window.location.href = "dashboard.html";
}else{
    window.location.href = "dashboard-pelanggan.html";
}


}

</script>

</body>
</html>
