<body>

<div class="d-flex">

<!-- ================= CONTENT ================= -->
<div class="content">

    <h2 class="fw-bold text-white">
        Form Pemesanan Barang
    </h2>

    <p class="text-white">
        Silakan isi data pesanan yang ingin diajukan.
    </p>

    <div class="table-card mt-4">

        <div class="mb-3">
            <label>Perusahaan Pemesan</label>
            <input type="text" id="perusahaan" class="form-control" placeholder="Contoh: PT. Sinar Baja">
        </div>

        <div class="mb-3">
            <label>Nama Barang</label>
            <input type="text" id="barang" class="form-control" placeholder="Contoh: Pipa Stainless 304">
        </div>

        <div class="mb-3">
            <label>Jumlah</label>
            <input type="number" id="jumlah" class="form-control" placeholder="Masukkan jumlah">
        </div>

        <div class="mb-3">
            <label>Alamat Pengiriman</label>
            <textarea id="alamat" class="form-control" rows="3"></textarea>
        </div>

        <div class="mb-3">
            <label>Keterangan</label>
            <textarea id="keterangan" class="form-control" rows="3"></textarea>
        </div>

        <button class="btn btn-primary" onclick="simpanPesanan()">
            Kirim Pesanan
        </button>

    </div>

</div>

</div>

<!-- ================= FIREBASE ================= -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCt5yenhrqh4T3130MQTYrCdPxYfLHF6-I",
  authDomain: "custiva-e4710.firebaseapp.com",
  databaseURL: "https://custiva-13223-default-rtdb.firebaseio.com",
  projectId: "custiva-e4710",
  storageBucket: "custiva-e4710.firebasestorage.app",
  messagingSenderId: "999523122079",
  appId: "1:999523122079:web:317db095a3c42575611baa"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.simpanPesanan = function () {

    const perusahaan = document.getElementById("perusahaan").value;
    const barang = document.getElementById("barang").value;
    const jumlah = document.getElementById("jumlah").value;
    const alamat = document.getElementById("alamat").value;
    const keterangan = document.getElementById("keterangan").value;

    if (perusahaan === "" || barang === "" || jumlah === "" || alamat === "") {
        alert("Lengkapi data pesanan terlebih dahulu!");
        return;
    }

    const data = {
        perusahaan,
        barang,
        jumlah,
        alamat,
        keterangan,
        status: "Menunggu Konfirmasi",
        tanggal: new Date().toLocaleString()
    };

    push(ref(db, "pesanan"), data);

    alert("Pesanan berhasil dikirim!");

    document.getElementById("perusahaan").value = "";
    document.getElementById("barang").value = "";
    document.getElementById("jumlah").value = "";
    document.getElementById("alamat").value = "";
    document.getElementById("keterangan").value = "";
}

</script>

</body>
